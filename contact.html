<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 叶杏涛 | 作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1A1F2E;
            --color-accent: #00D4AA;
            --color-highlight: #FFB800;
            --color-bg-light: #F5F7FA;
            --color-text: #0D1117;
            --color-text-secondary: #6B7280;
            --font-heading: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            --font-body: 'Inter', 'Noto Sans SC', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-bg-light);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 导航 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 31, 46, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .nav-logo {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-logo span {
            color: var(--color-accent);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--color-accent);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        /* Page Header */
        .page-header {
            background: var(--color-primary);
            padding: 140px 48px 80px;
            text-align: center;
        }

        .page-header h1 {
            font-family: var(--font-heading);
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
        }

        .page-header p {
            color: rgba(255,255,255,0.5);
            font-size: 18px;
        }

        /* Contact Section */
        .contact-section {
            padding: 100px 48px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .contact-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 60px;
            align-items: start;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Contact Info */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .info-card {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.06);
        }

        .info-card-title {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(0,212,170,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .social-link {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--color-bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.06);
        }

        .social-link:hover {
            background: var(--color-accent);
            transform: translateY(-4px);
        }

        /* Resume Download */
        .resume-card {
            background: linear-gradient(135deg, var(--color-primary), #2a3550);
            padding: 32px;
            border-radius: 16px;
            color: #fff;
            text-align: center;
        }

        .resume-icon {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .resume-title {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .resume-desc {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .btn-resume {
            display: inline-block;
            padding: 12px 28px;
            background: var(--color-highlight);
            color: var(--color-primary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-resume:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,184,0,0.3);
        }

        /* Footer */
        .footer {
            background: var(--color-primary);
            padding: 40px 48px;
            text-align: center;
        }

        .footer p {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .navbar {
                padding: 16px 24px;
            }

            .nav-links {
                gap: 16px;
            }

            .page-header {
                padding: 120px 24px 60px;
            }

            .page-header h1 {
                font-size: 36px;
            }

            .contact-section {
                padding: 60px 24px;
            }

        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.8s ease forwards;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">叶杏涛<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="about.html">关于我</a></li>
            <li><a href="projects.html">项目集</a></li>
            <li><a href="experience.html">经历</a></li>
            <li><a href="contact.html" class="active">联系</a></li>
        </ul>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <h1>联系我</h1>
        <p>期待与您探讨产品机会，共创价值</p>
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="contact-container">
            <!-- Contact Info -->
            <div class="contact-info">
                <div class="info-card">
                    <h3 class="info-card-title">联系信息</h3>
                    <div class="info-item">
                        <div class="info-icon">📧</div>
                        <div class="info-content">
                            <div class="info-label">邮箱</div>
                            <div class="info-value">2893248462@qq.com</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📱</div>
                        <div class="info-content">
                            <div class="info-label">电话</div>
                            <div class="info-value">13006882517</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📍</div>
                        <div class="info-content">
                            <div class="info-label">所在地</div>
                            <div class="info-value">广东省广州市</div>
                        </div>
                    </div>

                    <h3 class="info-card-title" style="margin-top: 24px;">社交平台</h3>
                    <div class="social-links">
                        <a href="#" class="social-link" title="GitHub">💻</a>
                        <a href="#" class="social-link" title="LinkedIn">💼</a>
                        <a href="#" class="social-link" title="微信">💬</a>
                        <a href="#" class="social-link" title="知乎">📚</a>
                    </div>
                </div>

                <div class="resume-card">
                    <div class="resume-icon">📄</div>
                    <div class="resume-title">下载完整简历</div>
                    <div class="resume-desc">获取详细的个人经历与项目介绍</div>
                    <a href="叶杏涛-产品经理_V2.pdf" class="btn-resume" download="简历">下载 PDF 简历</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 叶杏涛 · 作品集</p>
    </footer>

    <script>
        // Animate elements on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate-in');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.info-card, .resume-card').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
